<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Открытка для любимой</title>
<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,#ffe6f1,#fff);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

/* ===== ОРБИТЫ С ФОТО ===== */
.orbit-scene{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.orbit{
  position:absolute;
  left:50%;
  top:50%;
  border:1px dashed rgba(255,255,255,.18);
  border-radius:50%;
  transform:translate(-50%,-50%);
  animation:spin linear infinite;
}

.orbit1{width:980px;height:620px;animation-duration:22s;}
.orbit2{width:1140px;height:720px;animation-duration:30s;}
.orbit3{width:1280px;height:860px;animation-duration:38s;}

.planet{
  position:absolute;
  left:50%;
  top:0;
  transform:translate(-50%,-50%);
}

.planet.p1{top:0%;}
.planet.p2{top:18%; left:100%;}
.planet.p3{top:100%;}
.planet.p4{top:82%; left:0%;}
.planet.p5{top:50%; left:100%;}

.heart-frame{
  position:relative;
  width:150px;
  height:135px;
  transform:rotate(-45deg);
  overflow:hidden;
  border-radius:18px 18px 8px 18px;
  box-shadow:0 14px 28px rgba(0,0,0,.18);
  border:5px solid rgba(255,255,255,.96);
  background:#ffdbe9;
}

.heart-frame::before,
.heart-frame::after{
  content:"";
  position:absolute;
  width:150px;
  height:150px;
  background:inherit;
  border-radius:50%;
  z-index:2;
}

.heart-frame::before{
  top:-75px;
  left:0;
}

.heart-frame::after{
  left:75px;
  top:0;
}

.heart-frame img{
  position:absolute;
  inset:-18%;
  width:136%;
  height:136%;
  object-fit:cover;
  transform:rotate(45deg);
  z-index:1;
}

/* белая обводка для верхних частей сердца */
.heart-outline{
  position:absolute;
  inset:0;
  z-index:3;
  pointer-events:none;
}
.heart-outline::before,
.heart-outline::after{
  content:"";
  position:absolute;
  width:150px;
  height:150px;
  border:5px solid rgba(255,255,255,.96);
  border-radius:50%;
  box-sizing:border-box;
}
.heart-outline::before{
  top:-75px;
  left:-5px;
}
.heart-outline::after{
  top:-5px;
  left:70px;
}

@keyframes spin{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* ===== ОТКРЫТКА ===== */
.card{
  width:min(760px,92vw);
  height:420px;
  border-radius:26px;
  perspective:1200px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  z-index:2;
}

.side{
  position:absolute;
  inset:0;
  border-radius:26px;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  backface-visibility:hidden;
  transform-style:preserve-3d;
  transition:transform .9s cubic-bezier(.2,.9,.2,1);
  box-shadow:0 25px 60px rgba(0,0,0,.18);
}

.front{
  background:
    radial-gradient(400px 200px at 20% 20%, rgba(255,255,255,.6), transparent 60%),
    linear-gradient(135deg,#ff4fa3,#ff8fc7);
  color:white;
}

.inside{
  background:linear-gradient(180deg,#fff,#fff0f7);
  transform:rotateY(-180deg);
}

.card.open .front{transform:rotateY(180deg)}
.card.open .inside{transform:rotateY(0deg)}

h1{font-size:42px;margin:0 0 10px}
.subtitle{font-size:18px;opacity:.9}

.message{
  font-size:20px;
  line-height:1.6;
  max-width:480px;
}

.signature{
  margin-top:24px;
  font-weight:700;
  color:#ff4fa3;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:25px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:999px;
  font-weight:700;
  background:#ff4fa3;
  color:white;
  cursor:pointer;
}

.btn.secondary{background:#ff8fc7}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  border-radius:26px;
  z-index:5;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:.6;
  animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
  from{opacity:.2}
  to{opacity:.9}
}

/* ===== АДАПТАЦИЯ ===== */
@media (max-width: 1200px){
  .orbit1{width:900px;height:580px}
  .orbit2{width:1020px;height:660px}
  .orbit3{width:1120px;height:760px}
  .heart-frame{width:125px;height:112px}
  .heart-frame::before,.heart-frame::after{width:125px;height:125px}
  .heart-frame::before{top:-62.5px}
  .heart-frame::after{left:62.5px}
  .heart-outline::before,.heart-outline::after{width:125px;height:125px}
  .heart-outline::before{top:-62.5px}
  .heart-outline::after{left:57.5px}
}

@media (max-width: 860px){
  .orbit3{display:none}
  .orbit1{width:760px;height:620px}
  .orbit2{width:860px;height:720px}
  .heart-frame{width:105px;height:94px}
  .heart-frame::before,.heart-frame::after{width:105px;height:105px}
  .heart-frame::before{top:-52.5px}
  .heart-frame::after{left:52.5px}
  .heart-outline::before,.heart-outline::after{width:105px;height:105px}
  .heart-outline::before{top:-52.5px}
  .heart-outline::after{left:47.5px}
}

@media (max-width: 560px){
  .card{
    width:92vw;
    height:500px;
  }

  .side{padding:24px}
  h1{font-size:34px}
  .message{font-size:17px}

  .orbit2,.orbit3{display:none}
  .orbit1{width:640px;height:760px;animation-duration:18s}
  .heart-frame{width:92px;height:82px}
  .heart-frame::before,.heart-frame::after{width:92px;height:92px}
  .heart-frame::before{top:-46px}
  .heart-frame::after{left:46px}
  .heart-outline::before,.heart-outline::after{width:92px;height:92px}
  .heart-outline::before{top:-46px}
  .heart-outline::after{left:41px}
}
</style>
</head>

<body>

<div class="orbit-scene">
  <div class="orbit orbit1">
    <div class="planet p1">
      <div class="heart-frame">
        <img src="Фото1.jpg" alt="Фото 1">
        <div class="heart-outline"></div>
      </div>
    </div>
    <div class="planet p3">
      <div class="heart-frame">
        <img src="Фото2.jpg" alt="Фото 2">
        <div class="heart-outline"></div>
      </div>
    </div>
  </div>

  <div class="orbit orbit2">
    <div class="planet p2">
      <div class="heart-frame">
        <img src="Фото3.jpg" alt="Фото 3">
        <div class="heart-outline"></div>
      </div>
    </div>
    <div class="planet p4">
      <div class="heart-frame">
        <img src="Фото4.jpg" alt="Фото 4">
        <div class="heart-outline"></div>
      </div>
    </div>
  </div>

  <div class="orbit orbit3">
    <div class="planet p5">
      <div class="heart-frame">
        <img src="Фото5.jpg" alt="Фото 5">
        <div class="heart-outline"></div>
      </div>
    </div>
  </div>
</div>

<div class="card" id="card">

  <div class="side front">
    <h1>💖 С 8 Марта</h1>
    <div class="subtitle">Нажми, чтобы открыть</div>
  </div>

  <div class="side inside">
    <div class="message">
      Для самой красивой девушки 💖<br><br>
      Пусть каждый твой день будет таким же
      ярким, как твоя улыбка.<br>
      Пусть рядом всегда будет тепло,
      радость и любовь.<br><br>
      Ты делаешь мой мир лучше.
    </div>

    <div class="signature">Люблю тебя</div>

    <div class="controls">
      <button class="btn" id="hearts">💗 Сердечки</button>
      <button class="btn secondary" id="kiss">💋 Поцелуй</button>
      <button class="btn" id="tulips">🌷 Тюльпаны</button>
    </div>
  </div>

  <canvas id="fx"></canvas>
</div>

<script>
const card = document.getElementById('card')
const canvas = document.getElementById('fx')
const ctx = canvas.getContext('2d')

function resize(){
  canvas.width = card.clientWidth
  canvas.height = card.clientHeight
}
resize()
window.addEventListener('resize', resize)

card.onclick = e => {
  if(e.target.tagName !== "BUTTON"){
    card.classList.toggle('open')
    spawnBurst(canvas.width / 2, canvas.height / 2, 60)
  }
}

let particles = []
let anim = null

function heart(x,y,size){
  ctx.beginPath()
  ctx.moveTo(x,y)
  ctx.bezierCurveTo(x-size,y-size,x-size*2,y+size/2,x,y+size*2)
  ctx.bezierCurveTo(x+size*2,y+size/2,x+size,y-size,x,y)
  ctx.fill()
}

function kiss(x,y,size){
  ctx.font = size + "px serif"
  ctx.fillText("💋", x, y)
}

function tulip(x,y,size,color,rot,leafTilt){
  ctx.save()
  ctx.translate(x,y)
  ctx.rotate(rot)

  const grad = ctx.createLinearGradient(0,-size*2.1,0,size*.4)
  grad.addColorStop(0,'#fff4fb')
  grad.addColorStop(.28,color)
  grad.addColorStop(1,color)

  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.moveTo(0,0)
  ctx.quadraticCurveTo(-size*.95,-size*.95,-size*.42,-size*2.05)
  ctx.quadraticCurveTo(0,-size*1.55,size*.42,-size*2.05)
  ctx.quadraticCurveTo(size*.95,-size*.95,0,0)
  ctx.fill()

  ctx.strokeStyle = '#2b9a55'
  ctx.lineWidth = Math.max(1.6,size*.16)
  ctx.lineCap = 'round'
  ctx.beginPath()
  ctx.moveTo(0,0)
  ctx.quadraticCurveTo(size*.08,size*.7,0,size*2.25)
  ctx.stroke()

  ctx.fillStyle = '#4bc06f'
  ctx.beginPath()
  ctx.moveTo(0,size*.82)
  ctx.quadraticCurveTo(-size*(.78+leafTilt),size*.35,-size*.18,size*1.55)
  ctx.quadraticCurveTo(-size*.02,size*1.18,0,size*.82)
  ctx.fill()

  ctx.beginPath()
  ctx.moveTo(0,size*1.02)
  ctx.quadraticCurveTo(size*(.58+leafTilt*.4),size*.62,size*.12,size*1.82)
  ctx.quadraticCurveTo(size*.01,size*1.35,0,size*1.02)
  ctx.fill()

  ctx.restore()
}

function spawnBurst(x,y,count){
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*5,
      vy:-(Math.random()*2.2+0.6),
      life:120+Math.random()*40,
      size:6+Math.random()*8,
      type:"heart"
    })
  }
  startAnim()
}

function startHearts(){
  particles = particles.concat(Array.from({length:120},() => ({
    x:Math.random()*canvas.width,
    y:canvas.height+20,
    vx:(Math.random()-0.5)*0.5,
    vy:-(Math.random()*2.2+0.6),
    life:240,
    size:6+Math.random()*8,
    type:"heart"
  })))
  startAnim()
}

function startKisses(){
  particles = particles.concat(Array.from({length:70},() => ({
    x:Math.random()*(canvas.width-40),
    y:canvas.height+20,
    vx:(Math.random()-0.5)*0.4,
    vy:-(Math.random()*2+0.8),
    life:220,
    size:20+Math.random()*8,
    type:"kiss"
  })))
  startAnim()
}

function startTulips(){
  const colors = ["#ff4fa3","#ffd84d","#8e5cff"]
  particles = particles.concat(Array.from({length:50},() => ({
    x:20 + Math.random()*(canvas.width-40),
    y:-20,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()*1.2+0.8),
    vr:(Math.random()-0.5)*0.02,
    rot:(Math.random()-0.5)*0.3,
    leafTilt:Math.random()*0.35,
    life:220,
    size:9+Math.random()*6,
    color:colors[Math.floor(Math.random()*colors.length)],
    type:"tulip"
  })))
  startAnim()
}

function startAnim(){
  if(!anim) animate()
}

function animate(){
  anim = requestAnimationFrame(animate)
  ctx.clearRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle = "#ff4fa3"

  particles.forEach(p => {
    p.x += p.vx
    p.y += p.vy
    p.vy += 0.003
    p.life--

    if(p.type === "heart") {
      heart(p.x,p.y,p.size)
    } else if(p.type === "kiss") {
      kiss(p.x,p.y,p.size)
    } else {
      p.rot += p.vr
      tulip(p.x,p.y,p.size,p.color,p.rot,p.leafTilt)
    }
  })

  particles = particles.filter(p =>
    p.life > 0 &&
    p.x > -60 && p.x < canvas.width + 60 &&
    p.y > -80 && p.y < canvas.height + 80
  )

  if(!particles.length){
    cancelAnimationFrame(anim)
    anim = null
  }
}

document.getElementById('hearts').onclick = e => {
  e.stopPropagation()
  startHearts()
}
document.getElementById('kiss').onclick = e => {
  e.stopPropagation()
  startKisses()
}
document.getElementById('tulips').onclick = e => {
  e.stopPropagation()
  startTulips()
}

for(let i=0;i<60;i++){
  const s = document.createElement('div')
  s.className = 'star'
  s.style.left = Math.random()*100+'%'
  s.style.top = Math.random()*100+'%'
  document.body.appendChild(s)
}
</script>

</body>
</html>
